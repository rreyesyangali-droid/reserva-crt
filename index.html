<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reserva CRT</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px; }

.grid {
  display:grid;
  grid-template-columns: 120px repeat(5, 1fr);
  gap:5px;
}

.header { text-align:center; font-weight:bold; padding:10px; }

.hora { background:#eee; text-align:center; padding:8px; }

.celda {
  min-height:60px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  border-radius:5px;
  font-weight:bold;
}

.ocupado {
  color:white;
  cursor:not-allowed;
}

.seleccionada {
  border:3px solid black;
}

#panelAdmin { display:none; }

button { padding:10px; margin-top:10px; }
</style>
</head>

<body>
<div class="container">

<h2>🏫 I.E. N°0162 SAN JOSÉ OBRERO</h2>

<select id="docente">
<option value="">Seleccione docente</option>
<option>ROCIO REYES</option>
<option>MARIA LIMACHE</option>
<option>ROSAMEL JIMENEZ</option>
<option>MARISOL BRAVO</option>
<option>ROGER CUEVA</option>
</select>

<br>
<button onclick="confirmarReserva()">RESERVAR</button>

<div class="grid" id="tabla"></div>

<h3>🔐 Acceso Administrador</h3>
<input type="password" id="claveAdmin">
<button onclick="modoAdmin()">Ingresar</button>

<!-- PANEL SOLO ADMIN -->
<div id="panelAdmin">
<h3>📊 Estadísticas</h3>
<canvas id="grafico"></canvas>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAtUo0_SaYsJYhBSJ-CwW1GU1Y4Iemq92M",
  authDomain: "reserva-crt.firebaseapp.com",
  projectId: "reserva-crt"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let seleccion = {};
let ocupadas = {};
let admin=false;
let chart;

const horas=[
"07:45 - 08:30",
"08:30 - 09:15",
"09:15 - 10:00",
"RECREO",
"10:30 - 11:15",
"11:15 - 12:00",
"12:00 - 12:45"
];

const dias=["Lunes","Martes","Miércoles","Jueves","Viernes"];

function colorUnico(id){
 let hash=0;
 for(let i=0;i<id.length;i++){
  hash=id.charCodeAt(i)+((hash<<5)-hash);
 }
 return `hsl(${hash%360},70%,65%)`;
}

function crearTabla(){
 let tabla=document.getElementById("tabla");
 tabla.innerHTML="";

 tabla.innerHTML+="<div></div>";
 dias.forEach(d=>tabla.innerHTML+=`<div class="header">${d}</div>`);

 horas.forEach(h=>{
  tabla.innerHTML+=`<div class="hora">${h}</div>`;

  dias.forEach((d,i)=>{
   if(h==="RECREO"){
     const letras=["B","R","E","A","K"];
     tabla.innerHTML+=`<div class="celda">${letras[i]}</div>`;
   }else{
     tabla.innerHTML+=`<div class="celda" onclick="seleccionar('${d}','${h}',this)"></div>`;
   }
  });
 });
}

function seleccionar(dia,hora,elemento){
 let key = dia+"-"+hora;

 if(ocupadas[key]){
   alert("❌ Ya reservado");
   return;
 }

 document.querySelectorAll(".celda").forEach(c=>c.classList.remove("seleccionada"));
 elemento.classList.add("seleccionada");

 seleccion={dia,hora};
}

function confirmarReserva(){
 let docente=document.getElementById("docente").value;

 if(!docente) return alert("Seleccione docente");
 if(!seleccion.dia) return alert("Seleccione un cuadro");

 let key = seleccion.dia+"-"+seleccion.hora;

 if(ocupadas[key]){
   alert("❌ Ya ocupado");
   return;
 }

 db.collection("reservas").add({
   docente,
   dia:seleccion.dia,
   hora:seleccion.hora
 })
 .then(doc=>{
   generarBoleta(docente,seleccion.dia,seleccion.hora,doc.id);
 });
}

function generarBoleta(docente,dia,hora,id){
 let texto=`${docente}\n${dia} - ${hora}\nID:${id}`;

 QRCode.toDataURL(texto,function(err,url){
   let v=window.open("");
   v.document.write(`<h2>BOLETA</h2><p>${docente}</p><p>${dia} ${hora}</p><img src='${url}'>`);
   setTimeout(()=>v.print(),500);
 });
}

function cargar(){
 db.collection("reservas").onSnapshot(snap=>{
  crearTabla();
  ocupadas={};

  let conteo={};

  snap.forEach(doc=>{
   let d=doc.data();
   let key=d.dia+"-"+d.hora;
   ocupadas[key]=true;

   document.querySelectorAll(".celda").forEach(c=>{
     if(c.getAttribute("onclick")===`seleccionar('${d.dia}','${d.hora}',this)`){
       c.style.background=colorUnico(doc.id);
       c.innerHTML=d.docente;
       c.classList.add("ocupado");

       // BOTÓN BORRAR SOLO ADMIN
       if(admin){
         let btn=document.createElement("button");
         btn.textContent="X";
         btn.onclick=()=>db.collection("reservas").doc(doc.id).delete();
         c.appendChild(btn);
       }
     }
   });

   conteo[d.docente]=(conteo[d.docente]||0)+1;
  });

  // SOLO ADMIN VE GRÁFICO
  if(admin){
    graficar(conteo);
  }
 });
}

function modoAdmin(){
 if(document.getElementById("claveAdmin").value==="1234"){
  admin=true;
  document.getElementById("panelAdmin").style.display="block";
  alert("Modo administrador activado");
  cargar();
 }
}

function graficar(data){
 let ctx=document.getElementById("grafico");
 if(chart) chart.destroy();

 chart=new Chart(ctx,{
  type:'bar',
  data:{
    labels:Object.keys(data),
    datasets:[{data:Object.values(data), label:"Reservas"}]
  }
 });
}

crearTabla();
cargar();
</script>

</body>
</html>
