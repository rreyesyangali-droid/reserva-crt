<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Horario de Reservas Docentes</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body { font-family: Arial; background:#f4f4f4; }
    .container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
    select, input, button { padding:10px; margin:5px; }

    .grid {
      display:grid;
      grid-template-columns: 100px repeat(5, 1fr);
      gap:5px;
      margin-top:20px;
    }

    .header { font-weight:bold; text-align:center; }
    .hora { background:#eee; text-align:center; padding:8px; }

    .celda {
      background:#e3f2fd;
      min-height:50px;
      padding:5px;
      border-radius:5px;
      cursor:pointer;
    }

    .ocupado {
      background:#ff6b6b;
      color:white;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>📅 Horario Pedagógico</h2>

  <input type="text" id="nombre" placeholder="Nombre del docente">
  <select id="dia">
    <option>Lunes</option>
    <option>Martes</option>
    <option>Miércoles</option>
    <option>Jueves</option>
    <option>Viernes</option>
  </select>

  <select id="horaSelect"></select>

  <button onclick="reservar()">Reservar</button>

  <div class="grid" id="tabla"></div>

  <h3>🔐 Admin</h3>
  <input type="password" id="claveAdmin" placeholder="Clave">
  <button onclick="modoAdmin()">Acceder</button>

  <h3>📊 Estadísticas</h3>
  <canvas id="grafico"></canvas>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAtUo0_SaYsJYhBSJ-CwW1GU1Y4Iemq92M",
  authDomain: "reserva-crt.firebaseapp.com",
  projectId: "reserva-crt",
  storageBucket: "reserva-crt.firebasestorage.app",
  messagingSenderId: "899935204114",
  appId: "1:899935204114:web:fa05b7053d0202d1c339cb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let admin = false;
let chart;

const horas = [
  "07:45 - 08:30",
  "08:30 - 09:15",
  "09:15 - 10:00",
  "RECREO 10:00 - 10:30",
  "10:30 - 11:15",
  "11:15 - 12:00",
  "12:00 - 12:45"
];

const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes"];

// llenar select
const horaSelect = document.getElementById("horaSelect");
horas.forEach(h => {
  if(!h.includes("RECREO")){
    const op = document.createElement("option");
    op.value = h;
    op.textContent = h;
    horaSelect.appendChild(op);
  }
});

function crearTabla(){
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  tabla.innerHTML += "<div></div>";
  dias.forEach(d => tabla.innerHTML += `<div class='header'>${d}</div>`);

  horas.forEach(h => {
    tabla.innerHTML += `<div class='hora'>${h}</div>`;

    dias.forEach(d => {
      const id = `${d}-${h}`;
      tabla.innerHTML += `<div class='celda' id='${id}'></div>`;
    });
  });
}

function reservar(){
  const nombre = document.getElementById("nombre").value;
  const dia = document.getElementById("dia").value;
  const hora = document.getElementById("horaSelect").value;

  if(!nombre) return alert("Ingrese nombre");

  db.collection("reservas").add({ nombre, dia, hora })
  .then(doc => generarQR(nombre, dia, hora, doc.id));
}

function generarQR(nombre, dia, hora, id){
  const texto = `Docente: ${nombre}\nDía: ${dia}\nHora: ${hora}\nID: ${id}`;

  QRCode.toDataURL(texto, function(err, url){
    const a = document.createElement("a");
    a.href = url;
    a.download = "QR.png";
    a.click();
  });
}

function cargar(){
  db.collection("reservas").onSnapshot(snapshot=>{
    crearTabla();

    let conteo = {};

    snapshot.forEach(doc=>{
      const d = doc.data();
      const celda = document.getElementById(`${d.dia}-${d.hora}`);

      if(celda){
        celda.classList.add("ocupado");
        celda.innerHTML = d.nombre;

        if(admin){
          const btn = document.createElement("button");
          btn.textContent = "X";
          btn.onclick = ()=> db.collection("reservas").doc(doc.id).delete();
          celda.appendChild(btn);
        }
      }

      conteo[d.nombre] = (conteo[d.nombre] || 0) + 1;
    });

    graficar(conteo);
  });
}

function modoAdmin(){
  if(document.getElementById("claveAdmin").value === "1234"){
    admin = true;
    alert("Admin activado");
    cargar();
  }
}

function graficar(data){
  const ctx = document.getElementById("grafico");
  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type:'bar',
    data:{
      labels:Object.keys(data),
      datasets:[{ data:Object.values(data), label:"Reservas" }]
    }
  });
}

crearTabla();
cargar();
</script>
</body>
</html>
