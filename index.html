<script>
const firebaseConfig = {
  apiKey: "AIzaSyAtUo0_SaYsJYhBSJ-CwW1GU1Y4Iemq92M",
  authDomain: "reserva-crt.firebaseapp.com",
  projectId: "reserva-crt"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let seleccion = {};
let ocupadas = {};
let admin=false;
let chart;

// 🔥 CORREGIDO (SEMANA CONSISTENTE)
function obtenerSemanaActual(){
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  const dia = hoy.getDay();
  const diferencia = hoy.getDate() - dia + (dia === 0 ? -6 : 1);
  const lunes = new Date(hoy.setDate(diferencia));
  return lunes.toISOString().split('T')[0];
}

const horas=[
"07:45 - 08:30",
"08:30 - 09:15",
"09:15 - 10:00",
"RECREO",
"10:30 - 11:15",
"11:15 - 12:00",
"12:00 - 12:45"
];

const dias=["Lunes","Martes","Miércoles","Jueves","Viernes"];

function colorUnico(id){
 let hash=0;
 for(let i=0;i<id.length;i++){
  hash=id.charCodeAt(i)+((hash<<5)-hash);
 }
 return `hsl(${hash%360},70%,65%)`;
}

function crearTabla(){
 let tabla=document.getElementById("tabla");
 tabla.innerHTML="";

 tabla.innerHTML+="<div></div>";
 dias.forEach(d=>tabla.innerHTML+=`<div class="header">${d}</div>`);

 horas.forEach(h=>{
  tabla.innerHTML+=`<div class="hora">${h}</div>`;

  dias.forEach((d,i)=>{
   if(h==="RECREO"){
     const letras=["B","R","E","A","K"];
     tabla.innerHTML+=`<div class="celda">${letras[i]}</div>`;
   }else{
     tabla.innerHTML+=`<div class="celda" id="${d}-${h}" onclick="seleccionar('${d}','${h}',this)"></div>`;
   }
  });
 });
}

function seleccionar(dia,hora,el){
 let key=dia+"-"+hora;

 if(ocupadas[key]){
  alert("❌ Ya reservado");
  return;
 }

 document.querySelectorAll(".celda").forEach(c=>c.classList.remove("seleccionada"));
 el.classList.add("seleccionada");

 seleccion={dia,hora};
}

function confirmarReserva(){
 let docente=document.getElementById("docente").value;

 if(!docente) return alert("Seleccione docente");
 if(!seleccion.dia) return alert("Seleccione un cuadro");

 let key=seleccion.dia+"-"+seleccion.hora;

 if(ocupadas[key]){
  alert("❌ Ya ocupado");
  return;
 }

 db.collection("reservas").add({
  docente,
  dia:seleccion.dia,
  hora:seleccion.hora,
  semana: obtenerSemanaActual()
 }).then(doc=>{
  generarBoleta(docente,seleccion.dia,seleccion.hora,doc.id);
 });
}

function generarBoleta(docente,dia,hora,id){
 let texto=`Docente: ${docente}\n${dia} - ${hora}\nID:${id}`;

 QRCode.toDataURL(texto,function(err,url){
   let a=document.createElement("a");
   a.href=url;
   a.download="boleta_QR.png";
   a.click();
 });
}

function cargar(){
 db.collection("reservas")
 .where("semana","==", obtenerSemanaActual())
 .onSnapshot(snap=>{
  crearTabla();
  ocupadas={};

  let conteo={};

  snap.forEach(doc=>{
   let d=doc.data();
   let key=d.dia+"-"+d.hora;
   ocupadas[key]=true;

   let celda=document.getElementById(key);

   if(celda){
     celda.style.background=colorUnico(doc.id);
     celda.innerHTML=d.docente;
     celda.classList.add("ocupado");

     if(admin){
       let btn=document.createElement("button");
       btn.textContent="X";
       btn.onclick=()=>db.collection("reservas").doc(doc.id).delete();
       celda.appendChild(btn);
     }
   }

   conteo[d.docente]=(conteo[d.docente]||0)+1;
  });

  if(admin) graficar(conteo);
 });
}

function modoAdmin(){
 if(document.getElementById("claveAdmin").value==="1234"){
  admin=true;
  document.getElementById("panelAdmin").style.display="block";
  alert("Modo administrador activado");
  cargar();
 }
}

function borrarSemana(){
 if(!admin) return;

 if(!confirm("¿Eliminar TODAS las reservas de esta semana?")) return;

 db.collection("reservas")
 .where("semana","==", obtenerSemanaActual())
 .get()
 .then(snap=>{
   snap.forEach(doc=>{
     db.collection("reservas").doc(doc.id).delete();
   });
   alert("Semana reiniciada");
 });
}

function graficar(data){
 let ctx=document.getElementById("grafico");
 if(chart) chart.destroy();

 chart=new Chart(ctx,{
  type:'bar',
  data:{
    labels:Object.keys(data),
    datasets:[{data:Object.values(data), label:"Reservas"}]
  }
 });
}

crearTabla();
cargar();
</script>
