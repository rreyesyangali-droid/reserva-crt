<script>
const firebaseConfig = {
  apiKey: "AIzaSyAtUo0_SaYsJYhBSJ-CwW1GU1Y4Iemq92M",
  authDomain: "reserva-crt.firebaseapp.com",
  projectId: "reserva-crt"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let admin=false;
let chart;

const horas=[
"07:45 - 08:30",
"08:30 - 09:15",
"09:15 - 10:00",
"RECREO",
"10:30 - 11:15",
"11:15 - 12:00",
"12:00 - 12:45"
];

const dias=["Lunes","Martes","Miércoles","Jueves","Viernes"];

function colorUnico(id){
 let hash=0;
 for(let i=0;i<id.length;i++){
  hash=id.charCodeAt(i)+((hash<<5)-hash);
 }
 return `hsl(${hash%360},70%,65%)`;
}

function crearTabla(){
 let tabla=document.getElementById("tabla");
 tabla.innerHTML="";

 tabla.innerHTML+="<div></div>";
 dias.forEach(d=>tabla.innerHTML+=`<div class="header">${d}</div>`);

 horas.forEach(h=>{
  tabla.innerHTML+=`<div class="hora">${h}</div>`;

  dias.forEach((d,i)=>{
   if(h==="RECREO"){
     const letras=["B","R","E","A","K"];
     tabla.innerHTML+=`<div class="celda">${letras[i]}</div>`;
   }else{
     tabla.innerHTML+=`<div class="celda" onclick="seleccionar('${d}','${h}')"></div>`;
   }
  });
 });
}

let seleccion={};

function seleccionar(dia,hora){
 let docente=document.getElementById("docente").value;
 if(!docente) return alert("Seleccione docente");

 db.collection("reservas").add({docente,dia,hora})
 .then(doc=>{
   generarQR(docente,dia,hora,doc.id);
 });
}

function generarQR(docente,dia,hora,id){
 let texto=`${docente} - ${dia} - ${hora}`;
 QRCode.toDataURL(texto,function(err,url){
   let a=document.createElement("a");
   a.href=url;
   a.download="QR.png";
   a.click();
 });
}

function cargar(){
 db.collection("reservas").onSnapshot(snap=>{
  crearTabla();
  let conteo={};

  snap.forEach(doc=>{
   let d=doc.data();
   let celda=document.querySelector(`[onclick="seleccionar('${d.dia}','${d.hora}')"]`);

   if(celda){
    celda.style.background=colorUnico(doc.id);
    celda.classList.add("ocupado");
    celda.innerHTML=d.docente;

    if(admin){
     let btn=document.createElement("button");
     btn.textContent="X";
     btn.onclick=()=>db.collection("reservas").doc(doc.id).delete();
     celda.appendChild(btn);
    }
   }

   conteo[d.docente]=(conteo[d.docente]||0)+1;
  });

  graficar(conteo);
 });
}

function modoAdmin(){
 if(document.getElementById("claveAdmin").value==="1234"){
  admin=true;
  cargar();
 }
}

function graficar(data){
 let ctx=document.getElementById("grafico");
 if(chart) chart.destroy();

 chart=new Chart(ctx,{
  type:'bar',
  data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}
 });
}

crearTabla();
cargar();
</script>
