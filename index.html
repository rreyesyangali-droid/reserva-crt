<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reserva CRT</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; }
.container { max-width:1000px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
h1, h2 { text-align:center; }

select, button { padding:10px; margin:5px; }

.grid {
  display:grid;
  grid-template-columns: 120px repeat(5, 1fr);
  gap:5px;
  margin-top:20px;
}

.hora { background:#eee; text-align:center; padding:8px; }

.recreo { background:#ffeeba; }

.celda { min-height:50px; display:flex; justify-content:center; align-items:center; border-radius:5px; }

.ocupado { color:white; }
</style>
</head>

<body>
<div class="container">

<h1>🏫 I.E. N°0162 "SAN JOSÉ OBRERO"</h1>
<h2>Reserva CRT</h2>

<select id="docente">
<option value="">Seleccione docente</option>
<option>REYES YANGALI ROCIO</option>
<option>SEMINARIO HUERTA PILAR</option>
<option>MENA MENDOZA ESTHER</option>
<option>RODRIGUEZ MOLINA MARY</option>
<option>CASTRO LLANTERHUAY KATHERIN</option>
<option>CAMPOS MARTOS MILAGROS</option>
</select>

<select id="dia">
<option>Lunes</option>
<option>Martes</option>
<option>Miércoles</option>
<option>Jueves</option>
<option>Viernes</option>
</select>

<select id="hora"></select>

<button onclick="reservar()">Reservar</button>

<div class="grid" id="tabla"></div>

<h3>🔐 Admin</h3>
<input type="password" id="claveAdmin">
<button onclick="modoAdmin()">Acceder</button>

<h3>📊 Estadísticas</h3>
<canvas id="grafico"></canvas>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAtUo0_SaYsJYhBSJ-CwW1GU1Y4Iemq92M",
  authDomain: "reserva-crt.firebaseapp.com",
  projectId: "reserva-crt"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let admin = false;
let chart;

const horas = [
"07:45 - 08:30",
"08:30 - 09:15",
"09:15 - 10:00",
"RECREO 10:00 - 10:30",
"10:30 - 11:15",
"11:15 - 12:00",
"12:00 - 12:45"
];

const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes"];

// llenar horas
const horaSelect = document.getElementById("hora");
horas.forEach(h=>{
 if(!h.includes("RECREO")){
   let op=document.createElement("option");
   op.value=h;
   op.textContent=h;
   horaSelect.appendChild(op);
 }
});

// color
function colorUnico(id){
 let hash=0;
 for(let i=0;i<id.length;i++){
   hash=id.charCodeAt(i)+((hash<<5)-hash);
 }
 return `hsl(${hash%360},70%,65%)`;
}

// tabla SIN encabezados de días
function crearTabla(){
 let tabla=document.getElementById("tabla");
 tabla.innerHTML="";

 horas.forEach(h=>{
   tabla.innerHTML+=`<div class='hora ${h.includes("RECREO")?"recreo":""}'>${h}</div>`;
   dias.forEach(d=>{
     tabla.innerHTML+=`<div class='celda' id='${d}-${h}'></div>`;
   });
 });
}

// reservar
function reservar(){
 let docente=document.getElementById("docente").value;
 let dia=document.getElementById("dia").value;
 let hora=document.getElementById("hora").value;

 if(!docente) return alert("Seleccione docente");

 db.collection("reservas").add({docente,dia,hora})
 .then(doc=> generarQR(docente,dia,hora,doc.id));
}

// QR
function generarQR(docente,dia,hora,id){
 let texto=`${docente} - ${dia} - ${hora}`;
 QRCode.toDataURL(texto,function(err,url){
   let a=document.createElement("a");
   a.href=url;
   a.download="QR.png";
   a.click();
 });
}

// cargar
function cargar(){
 db.collection("reservas").onSnapshot(snap=>{
   crearTabla();
   let conteo={};

   snap.forEach(doc=>{
     let d=doc.data();
     let celda=document.getElementById(`${d.dia}-${d.hora}`);

     if(celda){
       celda.style.background=colorUnico(doc.id);
       celda.classList.add("ocupado");
       celda.innerHTML=d.docente;
     }

     conteo[d.docente]=(conteo[d.docente]||0)+1;
   });

   graficar(conteo);
 });
}

// admin
function modoAdmin(){
 if(document.getElementById("claveAdmin").value==="1234"){
   admin=true;
   cargar();
 }
}

// gráfico
function graficar(data){
 let ctx=document.getElementById("grafico");
 if(chart) chart.destroy();

 chart=new Chart(ctx,{
   type:'bar',
   data:{
     labels:Object.keys(data),
     datasets:[{data:Object.values(data)}]
   }
 });
}

crearTabla();
cargar();
</script>

</body>
</html>
